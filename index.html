<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepak Kushwaha — Portfolio</title>
  <meta name="description" content="Professional profile, experience, certifications and projects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>" />
</head>
<body>
  <!-- Navigation -->
  <header class="nav" id="nav">
    <div class="container nav__inner">
      <a href="#top" class="nav__brand" id="navBrand">Portfolio</a>
      <nav class="nav__links">
        <a href="#about">About</a>
        <a href="#experience">Experience</a>
        <a href="#skills">Skills</a>
        <a href="#certifications">Certifications</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
      </nav>
      <div class="nav__actions">
        <button id="themeToggle" class="btn-icon" aria-label="Toggle theme" title="Toggle theme">🌙</button>
        <a href="admin.html" class="btn btn--ghost btn--sm">Admin</a>
      </div>
    </div>
  </header>

  <main id="top">
    <!-- Hero -->
    <section class="hero">
      <div class="container hero__inner">
        <div class="hero__text">
          <p class="hero__eyebrow" id="heroLocation"></p>
          <h1 class="hero__name" id="heroName"></h1>
          <h2 class="hero__title" id="heroTitle"></h2>
          <p class="hero__tagline" id="heroTagline"></p>
          <div class="hero__cta">
            <a href="#contact" class="btn btn--primary">Get in touch</a>
            <a href="#" class="btn btn--ghost" id="resumeBtn" hidden>Download CV</a>
          </div>
          <div class="hero__social" id="heroSocial"></div>
        </div>
        <div class="hero__photo">
          <div class="avatar" id="heroAvatar"><span id="heroInitials"></span></div>
        </div>
      </div>
    </section>

    <!-- About -->
    <section id="about" class="section">
      <div class="container">
        <h2 class="section__title">About</h2>
        <p class="about__text" id="aboutText"></p>
      </div>
    </section>

    <!-- Experience -->
    <section id="experience" class="section section--alt">
      <div class="container">
        <h2 class="section__title">Experience</h2>
        <div class="timeline" id="experienceList"></div>
      </div>
    </section>

    <!-- Skills -->
    <section id="skills" class="section">
      <div class="container">
        <h2 class="section__title">Skills</h2>
        <div class="skills" id="skillsList"></div>
      </div>
    </section>

    <!-- Certifications -->
    <section id="certifications" class="section section--alt">
      <div class="container">
        <h2 class="section__title">Certifications</h2>
        <div class="cards" id="certificationsList"></div>
      </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="section">
      <div class="container">
        <h2 class="section__title">Projects</h2>
        <div class="projects" id="projectsList"></div>
      </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="section section--alt">
      <div class="container contact">
        <h2 class="section__title">Get in touch</h2>
        <p class="contact__lead">Have a role, project, or idea to discuss? I'd love to hear from you.</p>
        <div class="contact__links" id="contactLinks"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <span id="footerName"></span>
      <span class="footer__muted">Built with HTML5 · Hosted on GitHub Pages</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
